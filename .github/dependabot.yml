version: 2
updates:
  # go modules at repo root
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
  # npm app under site/
  - package-ecosystem: npm
    directory: /site
    schedule:
      interval: weekly
  # github actions workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
